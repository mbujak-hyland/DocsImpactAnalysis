---
name: Docs Impact Notification

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Merged PR number to analyze'
        required: true
        type: string

# Only run when a PR is actually merged (not just closed/abandoned)
jobs:
  check-docs-impact:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read        # Required to checkout repository files
      issues: write         # Required to create the notification issue
      pull-requests: write  # Required to comment on merged PR threads

    env:
      # GitHub username of the technical writer to notify.
      # Update this value to change who receives documentation review issues.
      TECH_WRITER: mbujak-hyland

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate policy assets (agent + skill)
        id: policy
        shell: bash
        run: |
          AGENT_FILE=".github/agents/docs-impact-notifier.agent.md"
          SKILL_FILE=".agents/skills/checking-doc-impact-standalone-for-PR/SKILL.md"

          if [ ! -f "$AGENT_FILE" ]; then
            echo "::error::Missing required policy file: $AGENT_FILE"
            exit 1
          fi

          if [ ! -f "$SKILL_FILE" ]; then
            echo "::error::Missing required policy file: $SKILL_FILE"
            exit 1
          fi

          AGENT_SHA=$(sha256sum "$AGENT_FILE" | awk '{print $1}')
          SKILL_SHA=$(sha256sum "$SKILL_FILE" | awk '{print $1}')

          {
            echo "agent_path=$AGENT_FILE"
            echo "skill_path=$SKILL_FILE"
            echo "agent_sha=$AGENT_SHA"
            echo "skill_sha=$SKILL_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Analyze PR for documentation impact
        id: analyzer
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isManual = context.eventName === 'workflow_dispatch';
            const manualInput = context.payload.inputs?.pr_number;

            let pr;
            let prNumber;

            if (isManual) {
              prNumber = parseInt(manualInput, 10);
              if (!Number.isInteger(prNumber) || prNumber <= 0) {
                core.setFailed('Invalid pr_number input. Provide a positive integer PR number.');
                return;
              }

              const prResp = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              pr = prResp.data;
            } else {
              pr = context.payload.pull_request;
              prNumber = pr.number;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const docPathRegex = /(^|\/)(docs?|documentation|changelog|changes)(\/|$)|\.(md|rst|adoc|txt)$/i;
            const docOnly = files.length > 0 && files.every((f) => docPathRegex.test(f.filename));

            const findings = [];
            let idCounter = 1;

            if (!docOnly) {
              for (const f of files) {
                if (docPathRegex.test(f.filename)) {
                  continue;
                }

                findings.push({
                  id: `F-${String(idCounter++).padStart(3, '0')}`,
                  description: 'Non-documentation change detected',
                  file: f.filename,
                  change_type: f.status,
                  audience: 'User/Admin/Operator',
                  breaking: f.status === 'removed',
                  summary: 'This change may affect behavior or configuration and should be reviewed for documentation impact.',
                });
              }
            }

            const verdict = docOnly ? 'Not Required' : 'Required';
            const reason = docOnly
              ? 'PR appears to contain documentation-only changes.'
              : 'PR includes non-documentation changes that require documentation review.';

            const verdictPayload = {
              pr_number: prNumber,
              verdict,
              reason,
              pr_title: pr.title,
              pr_url: pr.html_url,
              merged_at: pr.merged_at,
              author: pr.user?.login || '',
              breaking_changes: findings.some((f) => f.breaking),
              findings,
              ambiguous: [],
            };

            fs.writeFileSync('docs-impact-verdict.json', JSON.stringify(verdictPayload, null, 2));
            core.info(`Wrote docs-impact-verdict.json with verdict: ${verdict}`);

      - name: Read verdict file
        id: verdict
        run: |
          if [ ! -f docs-impact-verdict.json ]; then
            echo "verdict=error" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number || inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "error_msg=The analyzer step did not produce docs-impact-verdict.json." \
              >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERDICT=$(jq -r '.verdict' docs-impact-verdict.json)
          PR_NUMBER=$(jq -r '.pr_number' docs-impact-verdict.json)
          PR_TITLE=$(jq -r '.pr_title' docs-impact-verdict.json)
          PR_URL=$(jq -r '.pr_url' docs-impact-verdict.json)
          MERGED_AT=$(jq -r '.merged_at' docs-impact-verdict.json)
          AUTHOR=$(jq -r '.author' docs-impact-verdict.json)
          BREAKING=$(jq -r '.breaking_changes' docs-impact-verdict.json)
          REASON=$(jq -r '.reason' docs-impact-verdict.json)
          POLICY_AGENT_SHA="${{ steps.policy.outputs.agent_sha }}"
          POLICY_SKILL_SHA="${{ steps.policy.outputs.skill_sha }}"
          POLICY_AGENT_PATH="${{ steps.policy.outputs.agent_path }}"
          POLICY_SKILL_PATH="${{ steps.policy.outputs.skill_path }}"

          # Build a markdown findings list for use in the issue body
          FINDINGS_MD=$(jq -r '
            .findings[] |
            "**[\(.id)] \(.description)**\n" +
            "- File: `\(.file)`\n" +
            "- Change type: \(.change_type)\n" +
            "- Audience: \(.audience)\n" +
            "- Breaking: \(.breaking)\n" +
            "- \(.summary)\n"
          ' docs-impact-verdict.json)

          AMBIGUOUS_MD=$(jq -r '
            .ambiguous[] |
            "**[\(.id)] \(.description)**\n" +
            "- File: `\(.file)`\n" +
            "- Why ambiguous: \(.why_ambiguous)\n" +
            "- Treated as: \(.treated_as)\n"
          ' docs-impact-verdict.json)

          {
            echo "verdict=$VERDICT"
            echo "pr_number=$PR_NUMBER"
            echo "pr_title=$PR_TITLE"
            echo "pr_url=$PR_URL"
            echo "merged_at=$MERGED_AT"
            echo "author=$AUTHOR"
            echo "breaking=$BREAKING"
            echo "reason=$REASON"
            echo "policy_agent_sha=$POLICY_AGENT_SHA"
            echo "policy_skill_sha=$POLICY_SKILL_SHA"
            echo "policy_agent_path=$POLICY_AGENT_PATH"
            echo "policy_skill_path=$POLICY_SKILL_PATH"
            echo "findings_md<<FINDINGS_EOF"
            echo "$FINDINGS_MD"
            echo "FINDINGS_EOF"
            echo "ambiguous_md<<AMBIGUOUS_EOF"
            echo "$AMBIGUOUS_MD"
            echo "AMBIGUOUS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create documentation review issue
        if: steps.verdict.outputs.verdict == 'Required'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          PR_NUMBER: ${{ steps.verdict.outputs.pr_number }}
          PR_TITLE: ${{ steps.verdict.outputs.pr_title }}
          PR_URL: ${{ steps.verdict.outputs.pr_url }}
          MERGED_AT: ${{ steps.verdict.outputs.merged_at }}
          AUTHOR: ${{ steps.verdict.outputs.author }}
          BREAKING: ${{ steps.verdict.outputs.breaking }}
          POLICY_AGENT_SHA: ${{ steps.verdict.outputs.policy_agent_sha }}
          POLICY_SKILL_SHA: ${{ steps.verdict.outputs.policy_skill_sha }}
          POLICY_AGENT_PATH: ${{ steps.verdict.outputs.policy_agent_path }}
          POLICY_SKILL_PATH: ${{ steps.verdict.outputs.policy_skill_path }}
          FINDINGS_MD: ${{ steps.verdict.outputs.findings_md }}
          AMBIGUOUS_MD: ${{ steps.verdict.outputs.ambiguous_md }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber   = parseInt(process.env.PR_NUMBER, 10);
            const prTitle    = process.env.PR_TITLE;
            const prUrl      = process.env.PR_URL;
            const mergedAt   = process.env.MERGED_AT;
            const author     = process.env.AUTHOR;
            const breaking   = process.env.BREAKING === 'true';
            const findings   = process.env.FINDINGS_MD;
            const ambiguous  = process.env.AMBIGUOUS_MD;
            const techWriter = process.env.TECH_WRITER;

            const breakingBadge = breaking
              ? '> [!WARNING]\n> This PR contains **breaking changes**. Priority review required.\n\n'
              : '';

            const ambiguousSection = ambiguous.trim()
              ? `\n### Ambiguous Changes\n\n> These changes could not be conclusively classified and are treated as doc-impacting.\n\n${ambiguous}`
              : '';

            const body = [
              `## Documentation Review Required`,
              ``,
              breakingBadge,
              `Merged PR **[#${prNumber} — ${prTitle}](${prUrl})** requires a documentation update.`,
              ``,
              `| Field | Value |`,
              `|---|---|`,
              `| **Merged at** | ${mergedAt} |`,
              `| **Author** | @${author} |`,
              `| **Breaking changes** | ${breaking ? 'Yes ⚠️' : 'No'} |`,
              `| **Policy agent** | \`${process.env.POLICY_AGENT_PATH}\` |`,
              `| **Policy skill** | \`${process.env.POLICY_SKILL_PATH}\` |`,
              `| **Policy hash (agent)** | \`${process.env.POLICY_AGENT_SHA}\` |`,
              `| **Policy hash (skill)** | \`${process.env.POLICY_SKILL_SHA}\` |`,
              ``,
              `### Findings`,
              ``,
              findings,
              ambiguousSection,
              `---`,
              ``,
              `@${techWriter} please review the findings above and update the documentation accordingly.`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Docs Review] PR #${prNumber}: ${prTitle}`,
              body: body,
              assignees: [techWriter],
            });

            core.info(`Created documentation review issue: ${issue.data.html_url}`);

      - name: Post verdict as PR comment
        if: steps.verdict.outputs.verdict == 'Required' || steps.verdict.outputs.verdict == 'Not Required'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          REASON: ${{ steps.verdict.outputs.reason }}
          PR_NUMBER: ${{ steps.verdict.outputs.pr_number }}
          POLICY_AGENT_SHA: ${{ steps.verdict.outputs.policy_agent_sha }}
          POLICY_SKILL_SHA: ${{ steps.verdict.outputs.policy_skill_sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const verdict = process.env.VERDICT;
            const reason  = process.env.REASON;
            const icon    = verdict === 'Required' ? '📋' : '✅';
            const label   = verdict === 'Required'
              ? `A documentation review issue has been created and assigned to @${process.env.TECH_WRITER}.`
              : `No documentation update required. ${reason}`;
            const policyLine = `Policy hashes: agent=${process.env.POLICY_AGENT_SHA}, skill=${process.env.POLICY_SKILL_SHA}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body: `${icon} **Docs Impact Check:** ${verdict}\n\n${label}\n\n${policyLine}`,
            });

      - name: Handle analysis error
        if: steps.verdict.outputs.verdict == 'error'
        run: |
          echo "::warning::Docs impact analysis failed: ${{ steps.verdict.outputs.error_msg }}"
          echo "::warning::Manual documentation review may be required for PR #${{ steps.verdict.outputs.pr_number }}."
