---
name: Docs Impact Notification

# Runtime note:
# This workflow uses a script-based analyzer (actions/github-script).
# It does not execute repository agent/skill files at workflow runtime.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Merged PR number to analyze'
        required: true
        type: string

# Only run when a PR is actually merged (not just closed/abandoned)
jobs:
  check-docs-impact:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read        # Required to checkout repository files
      issues: write         # Required to create the notification issue
      pull-requests: write  # Required to comment on merged PR threads

    env:
      # GitHub username of the technical writer to notify.
      # Update this value to change who receives documentation review issues.
      TECH_WRITER: mbujak-hyland

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Analyze PR for documentation impact
        id: analyzer
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isManual = context.eventName === 'workflow_dispatch';
            const manualInput = context.payload.inputs?.pr_number;

            let pr;
            let prNumber;

            if (isManual) {
              prNumber = parseInt(manualInput, 10);
              if (!Number.isInteger(prNumber) || prNumber <= 0) {
                core.setFailed('Invalid pr_number input. Provide a positive integer PR number.');
                return;
              }

              const prResp = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              pr = prResp.data;
            } else {
              pr = context.payload.pull_request;
              prNumber = pr.number;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const findings = [];
            const ambiguous = [];

            const docPathRegex = /(^|\/)(docs?|documentation|changelog|release-notes)(\/|$)|\.(md|rst|adoc|txt)$/i;
            const neverDocPathRegex = /(^|\/)(test|tests|spec|__tests__|\.github\/workflows|\.github\/actions|build|ci|scripts|tools)(\/|$)|(^|\/)(\.pre-commit-config\.ya?ml|\.editorconfig|\.gitignore|\.gitattributes)$/i;
            const autoGeneratedRegex = /(Chart\.lock$|README\.md\.gotmpl$)/i;
            const configPathRegex = /(values\.ya?ml$|\.env(\.|$)|(^|\/)(config|settings)(\/|$)|application.*\.ya?ml$|docker-compose.*\.ya?ml$|compose\.ya?ml$|kustomization\.ya?ml$|Chart\.ya?ml$|\.properties$|\.ini$|\.conf$)/i;
            const docsTouched = files.some((f) => docPathRegex.test(f.filename));

            const getPatchLines = (patch, prefix) =>
              (patch || '')
                .split('\n')
                .filter((l) => l.startsWith(prefix) && !l.startsWith(prefix + prefix + prefix))
                .map((l) => l.slice(1));

            const nonWhitespaceChangesOnly = (patch) => {
              if (!patch) {
                return false;
              }

              const changed = (patch || '')
                .split('\n')
                .filter((l) => (l.startsWith('+') || l.startsWith('-')) && !l.startsWith('+++') && !l.startsWith('---'));

              if (changed.length === 0) {
                return false;
              }

              return changed.every((l) => l.slice(1).trim() === '');
            };

            const isVersionOnly = (patch) => {
              if (!patch) {
                return false;
              }

              const changed = (patch || '')
                .split('\n')
                .filter((l) => (l.startsWith('+') || l.startsWith('-')) && !l.startsWith('+++') && !l.startsWith('---'))
                .map((l) => l.slice(1).trim())
                .filter(Boolean);

              if (changed.length === 0) {
                return false;
              }

              const versionLine = /(^|\b)(version|appVersion|chartVersion|imageTag|tag|digest|dependency|dependencies)\b/i;
              const keyValueVersion = /^([A-Za-z0-9_.-]+)\s*[:=]\s*['"]?v?\d+\.\d+\.\d+([-.][A-Za-z0-9.]+)?['"]?$/;
              const semver = /\bv?\d+\.\d+\.\d+([-.][A-Za-z0-9.]+)?\b/;

              return changed.every((line) => versionLine.test(line) || keyValueVersion.test(line) || semver.test(line));
            };

            const isSecurityOnly = (patch) => {
              if (!patch) {
                return false;
              }

              const changed = (patch || '')
                .split('\n')
                .filter((l) => (l.startsWith('+') || l.startsWith('-')) && !l.startsWith('+++') && !l.startsWith('---'))
                .map((l) => l.slice(1).trim())
                .filter(Boolean);

              if (changed.length === 0) {
                return false;
              }

              const securityTerms = /(cve-|security|vulnerability|advisory|hardening|mitigation)/i;
              const behaviorTerms = /(config|value|env|flag|api|endpoint|feature|capability|behavior)/i;

              return changed.some((line) => securityTerms.test(line)) && !changed.some((line) => behaviorTerms.test(line));
            };

            let idCounter = 1;
            const addFinding = (f, description, summary, audience = 'operators') => {
              findings.push({
                id: `F-${String(idCounter++).padStart(3, '0')}`,
                file: f.filename,
                change_type: f.status,
                description,
                audience,
                breaking: f.status === 'removed',
                summary,
              });
            };

            for (const f of files) {
              const path = f.filename;
              const patch = f.patch || '';

              if (docPathRegex.test(path)) {
                continue;
              }

              if (autoGeneratedRegex.test(path)) {
                continue;
              }

              if (nonWhitespaceChangesOnly(patch)) {
                continue;
              }

              if (isVersionOnly(patch)) {
                continue;
              }

              if (isSecurityOnly(patch)) {
                continue;
              }

              if (neverDocPathRegex.test(path)) {
                continue;
              }

              const plusLines = getPatchLines(patch, '+');
              const minusLines = getPatchLines(patch, '-');
              const removedKey = minusLines.some((l) => /^\s*[A-Za-z_][A-Za-z0-9_.-]*\s*:\s*/.test(l));
              const changedDefault = plusLines.some((p) => {
                const m = p.match(/^\s*([A-Za-z_][A-Za-z0-9_.-]*)\s*:\s*/);
                return m && minusLines.some((n) => new RegExp(`^\\s*${m[1].replace(/[.*+?^${}()|[\\]\\]/g, '\\$&')}\\s*:\\s*`).test(n));
              });
              const dependencyChanged = /(\bdependencies\b|\brequirements\b|\bprerequisite\b|\bdependsOn\b)/i.test(patch) || /(package\.json$|go\.mod$|pom\.xml$|requirements\.txt$|Chart\.yaml$)/i.test(path);
              const featureChanged = /(\bfeature\b|\bcapability\b|\benable[A-Z_]|\bexperimental\b)/i.test(patch);
              const configLike = configPathRegex.test(path);

              const alwaysReasons = [];
              const ambiguousReasons = [];

              if (configLike) {
                alwaysReasons.push('New or changed configuration keys/parameters');
              }
              if (removedKey) {
                alwaysReasons.push('Removed or renamed configuration key (potential breaking change)');
              }
              if (changedDefault) {
                alwaysReasons.push('Changed default values that may alter behavior');
              }
              if (featureChanged) {
                alwaysReasons.push('Feature/capability behavior changed');
              }

              if (dependencyChanged) {
                if (alwaysReasons.length > 0) {
                  alwaysReasons.push('Dependencies or prerequisites changed');
                } else {
                  ambiguousReasons.push('Dependencies or prerequisites changed without explicit behavior/config deltas');
                }
              }

              if (alwaysReasons.length > 0) {
                addFinding(
                  f,
                  alwaysReasons[0],
                  `Detected doc-impacting change signals: ${alwaysReasons.join('; ')}.`
                );
                continue;
              }

              if (changedDefault) {
                ambiguousReasons.push('Default values changed and impact is unclear');
              }
              if (/\b(if|when|unless)\b/i.test(patch) && /\b(env|flag|option|value)\b/i.test(patch)) {
                ambiguousReasons.push('Conditional behavior may be user-controllable');
              }
              if (/\brename(d)?\b/i.test(patch) || (plusLines.length > 0 && minusLines.length > 0 && /\b(var|variable|key|name)\b/i.test(patch))) {
                ambiguousReasons.push('Internal rename may surface in logs/messages');
              }

              if (ambiguousReasons.length > 0) {
                ambiguous.push({
                  id: `A-${String(idCounter++).padStart(3, '0')}`,
                  file: f.filename,
                  description: 'Ambiguous change requiring conservative docs review',
                  why_ambiguous: ambiguousReasons.join('; '),
                  treated_as: 'doc-impacting',
                });
              }
            }

            let verdict = 'Not Required';
            let reason = 'Changes match non-doc-impacting categories only.';

            if (findings.length > 0 || ambiguous.length > 0) {
              verdict = 'Required';
              reason = 'One or more changes matched doc-impacting or ambiguous rules and require documentation review.';
              if (docsTouched) {
                reason += ' Documentation file changes (for example docs/ or README.md) were also detected but do not suppress this verdict.';
              }
            }

            const breakingChanges = findings.some((f) => f.breaking);

            const verdictPayload = {
              pr_number: prNumber,
              verdict,
              reason,
              pr_title: pr.title,
              pr_url: pr.html_url,
              merged_at: pr.merged_at,
              author: pr.user?.login || '',
              breaking_changes: breakingChanges,
              findings,
              ambiguous,
            };

            fs.writeFileSync('docs-impact-verdict.json', JSON.stringify(verdictPayload, null, 2));
            core.info(`Wrote docs-impact-verdict.json with verdict: ${verdict}`);

      - name: Read verdict file
        id: verdict
        run: |
          if [ ! -f docs-impact-verdict.json ]; then
            echo "verdict=error" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number || inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "error_msg=The analyzer step did not produce docs-impact-verdict.json." \
              >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERDICT=$(jq -r '.verdict' docs-impact-verdict.json)
          PR_NUMBER=$(jq -r '.pr_number' docs-impact-verdict.json)
          PR_TITLE=$(jq -r '.pr_title' docs-impact-verdict.json)
          PR_URL=$(jq -r '.pr_url' docs-impact-verdict.json)
          MERGED_AT=$(jq -r '.merged_at' docs-impact-verdict.json)
          AUTHOR=$(jq -r '.author' docs-impact-verdict.json)
          BREAKING=$(jq -r '.breaking_changes' docs-impact-verdict.json)
          REASON=$(jq -r '.reason' docs-impact-verdict.json)

          # Build a markdown findings list for use in the issue body
          FINDINGS_MD=$(jq -r '
            .findings[] |
            "**[\(.id)] \(.description)**\n" +
            "- File: `\(.file)`\n" +
            "- Change type: \(.change_type)\n" +
            "- Audience: \(.audience)\n" +
            "- Breaking: \(.breaking)\n" +
            "- \(.summary)\n"
          ' docs-impact-verdict.json)

          AMBIGUOUS_MD=$(jq -r '
            .ambiguous[] |
            "**[\(.id)] \(.description)**\n" +
            "- File: `\(.file)`\n" +
            "- Why ambiguous: \(.why_ambiguous)\n" +
            "- Treated as: \(.treated_as)\n"
          ' docs-impact-verdict.json)

          {
            echo "verdict=$VERDICT"
            echo "pr_number=$PR_NUMBER"
            echo "pr_title=$PR_TITLE"
            echo "pr_url=$PR_URL"
            echo "merged_at=$MERGED_AT"
            echo "author=$AUTHOR"
            echo "breaking=$BREAKING"
            echo "reason=$REASON"
            echo "findings_md<<FINDINGS_EOF"
            echo "$FINDINGS_MD"
            echo "FINDINGS_EOF"
            echo "ambiguous_md<<AMBIGUOUS_EOF"
            echo "$AMBIGUOUS_MD"
            echo "AMBIGUOUS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create documentation review issue
        if: steps.verdict.outputs.verdict == 'Required'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          PR_NUMBER: ${{ steps.verdict.outputs.pr_number }}
          PR_TITLE: ${{ steps.verdict.outputs.pr_title }}
          PR_URL: ${{ steps.verdict.outputs.pr_url }}
          MERGED_AT: ${{ steps.verdict.outputs.merged_at }}
          AUTHOR: ${{ steps.verdict.outputs.author }}
          BREAKING: ${{ steps.verdict.outputs.breaking }}
          FINDINGS_MD: ${{ steps.verdict.outputs.findings_md }}
          AMBIGUOUS_MD: ${{ steps.verdict.outputs.ambiguous_md }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber   = parseInt(process.env.PR_NUMBER, 10);
            const prTitle    = process.env.PR_TITLE;
            const prUrl      = process.env.PR_URL;
            const mergedAt   = process.env.MERGED_AT;
            const author     = process.env.AUTHOR;
            const breaking   = process.env.BREAKING === 'true';
            const findings   = process.env.FINDINGS_MD;
            const ambiguous  = process.env.AMBIGUOUS_MD;
            const techWriter = process.env.TECH_WRITER;

            const breakingBadge = breaking
              ? '> [!WARNING]\n> This PR contains **breaking changes**. Priority review required.\n\n'
              : '';

            const ambiguousSection = ambiguous.trim()
              ? `\n### Ambiguous Changes\n\n> These changes could not be conclusively classified and are treated as doc-impacting.\n\n${ambiguous}`
              : '';

            const body = [
              `## Documentation Review Required`,
              ``,
              breakingBadge,
              `Merged PR **[#${prNumber} — ${prTitle}](${prUrl})** requires a documentation update.`,
              ``,
              `| Field | Value |`,
              `|---|---|`,
              `| **Merged at** | ${mergedAt} |`,
              `| **Author** | @${author} |`,
              `| **Breaking changes** | ${breaking ? 'Yes ⚠️' : 'No'} |`,
              ``,
              `### Findings`,
              ``,
              findings,
              ambiguousSection,
              `---`,
              ``,
              `@${techWriter} please review the findings above and update the documentation accordingly.`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Docs Review] PR #${prNumber}: ${prTitle}`,
              body: body,
              assignees: [techWriter],
            });

            core.info(`Created documentation review issue: ${issue.data.html_url}`);

      - name: Post verdict as PR comment
        if: steps.verdict.outputs.verdict == 'Required' || steps.verdict.outputs.verdict == 'Not Required'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          REASON: ${{ steps.verdict.outputs.reason }}
          PR_NUMBER: ${{ steps.verdict.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const verdict = process.env.VERDICT;
            const reason  = process.env.REASON;
            const icon    = verdict === 'Required' ? '📋' : '✅';
            const label   = verdict === 'Required'
              ? `A documentation review issue has been created and assigned to @${process.env.TECH_WRITER}.`
              : `No documentation update required. ${reason}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body: `${icon} **Docs Impact Check:** ${verdict}\n\n${label}`,
            });

      - name: Handle analysis error
        if: steps.verdict.outputs.verdict == 'error'
        run: |
          echo "::warning::Docs impact analysis failed: ${{ steps.verdict.outputs.error_msg }}"
          echo "::warning::Manual documentation review may be required for PR #${{ steps.verdict.outputs.pr_number }}."
