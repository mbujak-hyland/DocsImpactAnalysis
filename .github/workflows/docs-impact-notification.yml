---
name: Docs Impact Notification

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Merged PR number to analyze'
        required: true
        type: string

# Only run when a PR is actually merged (not just closed/abandoned)
jobs:
  check-docs-impact:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read        # Required to checkout repository files
      pull-requests: read   # Required to read PR metadata and changed files

    env:
      # GitHub username of the technical writer to notify.
      # Update this value to change who receives documentation review issues.
      TECH_WRITER: mbujak-hyland

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Analyze PR for documentation impact
        id: analyzer
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isManual = context.eventName === 'workflow_dispatch';
            const manualInput = context.payload.inputs?.pr_number;

            let pr;
            let prNumber;

            if (isManual) {
              prNumber = parseInt(manualInput, 10);
              if (!Number.isInteger(prNumber) || prNumber <= 0) {
                core.setFailed('Invalid pr_number input. Provide a positive integer PR number.');
                return;
              }

              const prResp = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              pr = prResp.data;
            } else {
              pr = context.payload.pull_request;
              prNumber = pr.number;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const findings = [];
            const ambiguous = [];

            const hasDocsChanges = files.some((f) => f.filename.startsWith('docs/'));

            let idCounter = 1;
            const addFinding = (f, description, summary, audience = 'operators') => {
              findings.push({
                id: `F-${String(idCounter++).padStart(3, '0')}`,
                file: f.filename,
                change_type: f.status,
                description,
                audience,
                breaking: f.status === 'removed',
                summary,
              });
            };

            for (const f of files) {
              const path = f.filename;

              if (path.startsWith('docker-compose/')) {
                addFinding(
                  f,
                  'Docker Compose deployment artifact changed',
                  'Compose configuration changed and may require deployment documentation updates.'
                );
                continue;
              }

              if (path.startsWith('helm/')) {
                addFinding(
                  f,
                  'Helm chart artifact changed',
                  'Helm chart values/templates changed and may require Helm deployment documentation updates.'
                );
                continue;
              }

              if (path.startsWith('updatecli.d/')) {
                ambiguous.push({
                  id: `A-${String(idCounter++).padStart(3, '0')}`,
                  file: f.filename,
                  description: 'Automation config changed',
                  why_ambiguous: 'UpdateCLI changes can affect published image/version references indirectly.',
                  treated_as: 'doc-impacting',
                });
              }
            }

            let verdict = 'Not Required';
            let reason = 'No deployment-impacting Docker Compose or Helm changes detected.';

            if (findings.length > 0 || ambiguous.length > 0) {
              if (hasDocsChanges) {
                verdict = 'Not Required';
                reason = 'PR already contains documentation changes under docs/.';
              } else {
                verdict = 'Required';
                reason = 'Deployment-related artifacts changed without corresponding docs/ updates.';
              }
            }

            const breakingChanges = findings.some((f) => f.breaking);

            const verdictPayload = {
              pr_number: prNumber,
              verdict,
              reason,
              pr_title: pr.title,
              pr_url: pr.html_url,
              merged_at: pr.merged_at,
              author: pr.user?.login || '',
              breaking_changes: breakingChanges,
              findings,
              ambiguous,
            };

            fs.writeFileSync('docs-impact-verdict.json', JSON.stringify(verdictPayload, null, 2));
            core.info(`Wrote docs-impact-verdict.json with verdict: ${verdict}`);

      - name: Read verdict file
        id: verdict
        run: |
          if [ ! -f docs-impact-verdict.json ]; then
            echo "verdict=error" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number || inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "error_msg=The Copilot agent did not produce docs-impact-verdict.json." \
              >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERDICT=$(jq -r '.verdict' docs-impact-verdict.json)
          PR_NUMBER=$(jq -r '.pr_number' docs-impact-verdict.json)
          PR_TITLE=$(jq -r '.pr_title' docs-impact-verdict.json)
          PR_URL=$(jq -r '.pr_url' docs-impact-verdict.json)
          MERGED_AT=$(jq -r '.merged_at' docs-impact-verdict.json)
          AUTHOR=$(jq -r '.author' docs-impact-verdict.json)
          BREAKING=$(jq -r '.breaking_changes' docs-impact-verdict.json)
          REASON=$(jq -r '.reason' docs-impact-verdict.json)

          # Build a markdown findings list for use in the issue body
          FINDINGS_MD=$(jq -r '
            .findings[] |
            "**[\(.id)] \(.description)**\n" +
            "- File: `\(.file)`\n" +
            "- Change type: \(.change_type)\n" +
            "- Audience: \(.audience)\n" +
            "- Breaking: \(.breaking)\n" +
            "- \(.summary)\n"
          ' docs-impact-verdict.json)

          AMBIGUOUS_MD=$(jq -r '
            .ambiguous[] |
            "**[\(.id)] \(.description)**\n" +
            "- File: `\(.file)`\n" +
            "- Why ambiguous: \(.why_ambiguous)\n" +
            "- Treated as: \(.treated_as)\n"
          ' docs-impact-verdict.json)

          {
            echo "verdict=$VERDICT"
            echo "pr_number=$PR_NUMBER"
            echo "pr_title=$PR_TITLE"
            echo "pr_url=$PR_URL"
            echo "merged_at=$MERGED_AT"
            echo "author=$AUTHOR"
            echo "breaking=$BREAKING"
            echo "reason=$REASON"
            echo "findings_md<<FINDINGS_EOF"
            echo "$FINDINGS_MD"
            echo "FINDINGS_EOF"
            echo "ambiguous_md<<AMBIGUOUS_EOF"
            echo "$AMBIGUOUS_MD"
            echo "AMBIGUOUS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify technical writer (read-only)
        if: steps.verdict.outputs.verdict == 'Required'
        env:
          PR_NUMBER: ${{ steps.verdict.outputs.pr_number }}
          PR_TITLE: ${{ steps.verdict.outputs.pr_title }}
          PR_URL: ${{ steps.verdict.outputs.pr_url }}
          MERGED_AT: ${{ steps.verdict.outputs.merged_at }}
          AUTHOR: ${{ steps.verdict.outputs.author }}
          BREAKING: ${{ steps.verdict.outputs.breaking }}
          FINDINGS_MD: ${{ steps.verdict.outputs.findings_md }}
          AMBIGUOUS_MD: ${{ steps.verdict.outputs.ambiguous_md }}
        run: |
          echo "::warning::Docs update required for PR #$PR_NUMBER. Notify @$TECH_WRITER."

          {
            echo "## Documentation Review Required"
            echo
            echo "Technical writer: @$TECH_WRITER"
            echo
            echo "Merged PR: [#$PR_NUMBER - $PR_TITLE]($PR_URL)"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Merged at | $MERGED_AT |"
            echo "| Author | @$AUTHOR |"
            echo "| Breaking changes | $BREAKING |"
            echo
            echo "### Findings"
            echo
            echo "$FINDINGS_MD"
            if [ -n "$AMBIGUOUS_MD" ]; then
              echo
              echo "### Ambiguous Changes"
              echo
              echo "$AMBIGUOUS_MD"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report no documentation update needed
        if: steps.verdict.outputs.verdict == 'Not Required'
        run: |
          echo "## Docs Impact Check" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "No documentation update required." >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "Reason: ${{ steps.verdict.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Handle analysis error
        if: steps.verdict.outputs.verdict == 'error'
        run: |
          echo "::warning::Docs impact analysis failed: ${{ steps.verdict.outputs.error_msg }}"
          echo "::warning::Manual documentation review may be required for PR #${{ steps.verdict.outputs.pr_number }}."
